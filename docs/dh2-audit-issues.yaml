  - id: p1-untrained-and-alt-characteristic
    title: "DH2 audit · P1 · Untrained-skill halving + alternate characteristic"
    labels: [dh2-audit, "audit:p1", "area:tests", enhancement]
    body: |
      ## Audit point

      Two related gaps from `core.md` §"Untrained Skill Use" and skill
      descriptors' "Special Uses":

      - Non-Basic skills used at advance 0 should halve the
        characteristic. Not enforced.
      - Per-skill "alternate characteristic" overrides should be
        selectable in the test.

      ## Acceptance criteria

      - [ ] When `skill.advance === 0` and the skill descriptor flags
            `untrained: false`, the test target is halved.
      - [ ] Roll dialog dropdown defaults to `skill.characteristic` but
            allows override to any listed alternate.
      - [ ] Skill descriptor schema knows the alt characteristics.
      - [ ] Tests cover Trained-vs-Untrained and at least one alt-char
            skill (e.g. Athletics with Toughness).

  - id: p1-trying-again
    title: "DH2 audit · P1 · Trying Again — time/restriction gating"
