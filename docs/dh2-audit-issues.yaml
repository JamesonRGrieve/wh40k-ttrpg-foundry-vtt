      ## Acceptance criteria

      - [ ] `fate.threshold` slot on `creature.ts`, computed from path
            grant + Touched-By-The-Fates / talent modifiers.
      - [ ] Surfaced in character-sheet header alongside `fate.value`.
      - [ ] Burn-fate flow reads `fate.threshold` (not `fate.max`).
      - [ ] Tests + story.

