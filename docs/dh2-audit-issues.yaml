  # P0 — Combat completeness
  # ────────────────────────────────────────────────────────────────────

  - id: p0-combat-circumstance-modifiers
    title: "DH2 audit · P0 · Combat circumstance modifiers"
    labels: [dh2-audit, "audit:p0", "area:combat", enhancement]
    body: |
      ## Audit point

      `core.md` §"Combat Circumstances" enumerates 11+ situational modifiers
      (Cover light −20 / heavy −30 + cover-AP, Darkness, Difficult Terrain,
      Engaged-in-Melee-for-Ranged −20 BS, Fog/Mist/Shadow/Smoke −10..−30,
      Ganging Up +10 per extra attacker capped +30, Helpless +30 + auto-head
      on melee, Higher Ground +10 melee, Pinning −20 BS to act, Prone target
      +10 melee / −10 ranged, Size per Size trait, Stunned target +20,
      Unaware +30 + auto-head on melee). None are present in
      `src/module/rules/attack-options.ts` or the roll dialog.

      ## Acceptance criteria

      - [ ] `attack-options.ts` exposes a circumstance registry
            `{ id, label, modifier, appliesTo, requiresTarget? }`.
      - [ ] Roll dialog (called from `prepareUnifiedRoll()` /
            `documents/acolyte.ts:rollCharacteristicCheck`) surfaces a
            multi-select Circumstances panel.
      - [ ] Cover, Helpless, and Unaware cases that mutate damage call into
            `src/module/rolls/assign-damage-data.ts` instead of only the
            to-hit total.
      - [ ] Unit tests in `tests/rules/` for each modifier shape.
      - [ ] Storybook story for the panel inside the existing roll dialog.
      - [ ] All seven systems compile and behave.
      - [ ] `pnpm check` + ratchet pipeline pass.
      - [ ] Player-facing strings under `WH40K.Combat.Circumstance.*`.

      ## Out of scope

      Compendium content. Two-weapon fighting, weapon jams, and unjam
      action are separate issues.

  - id: p0-two-weapon-fighting
    title: "DH2 audit · P0 · Two-weapon fighting + Wielder/Master interaction"
    labels: [dh2-audit, "audit:p0", "area:combat", enhancement]
    body: |
      ## Audit point

      `core.md` §"Two-Weapon Fighting" specifies −20/−20 baseline, with
      Two-Weapon Wielder (drops to 0/−20) and Two-Weapon Master (0/0).
      grep for `twoWeapon` / `dualWield` / `offHand` across `src/module/`
      returns zero hits — no implementation at all.

      ## Acceptance criteria

      - [ ] `twoWeaponFighting` entry in `src/module/rules/combat-actions.ts`.
      - [ ] Off-hand penalty profile reads talent state via the existing
            talent registry (see `prerequisite-validator.ts` pattern).
      - [ ] Roll dialog flags which weapon is main vs off-hand.
      - [ ] Unit tests cover all three talent states (none / Wielder /
            Master) plus the Ambidextrous interaction.
      - [ ] Storybook coverage.
      - [ ] i18n under `WH40K.Combat.TwoWeapon.*`.

  - id: p0-weapon-jams-unjam
    title: "DH2 audit · P0 · Weapon jams + Unjam action (Reliable/Unreliable)"
    labels: [dh2-audit, "audit:p0", "area:combat", enhancement]
    body: |
      ## Audit point

      `core.md` §"Weapon Jams" defines: standard jam on 96–100, Unreliable
      jams on 91+, Reliable jams only on natural 100. The Unjam action
      clears it with a Full Action. None coded — `combat-actions.ts` has
      no `unjam` entry and the attack pipeline in
      `src/module/rolls/action-data.ts` never inspects the roll for jam.

      ## Acceptance criteria

      - [ ] `unjam` entry in `combat-actions.ts`.
      - [ ] After `rollTotal` is computed in `action-data.ts`, check the
            weapon's qualities (`reliable` / `unreliable`) against the
            threshold and apply a `jammed` Active Effect on the weapon
            item.
      - [ ] Jammed weapon refuses to fire until Unjam clears it.
      - [ ] Unit tests for all three jam profiles.
      - [ ] Storybook for the Unjam action button.
      - [ ] i18n under `WH40K.Combat.Jam.*`.

  - id: p0-righteous-fury
    title: "DH2 audit · P0 · Righteous Fury auto-roll on max damage"
    labels: [dh2-audit, "audit:p0", "area:combat", enhancement]
    body: |
      ## Audit point

      `core.md` §"Righteous Fury" — max damage die triggers a confirm
      roll on a critical-injury lookup. The threshold helper
      `getRighteousFuryThreshold(weapon)` already exists at
      `src/module/rules/weapon-quality-effects.ts:421` but is not called
      by `src/module/rolls/damage-data.ts:_totalDamage()`. Vengeful (X)
      and Gauss explicitly modify this threshold and are coded but unused.

      ## Acceptance criteria

      - [ ] `_totalDamage()` invokes `getRighteousFuryThreshold(weapon)`
            after rolling damage; on a die showing ≥ threshold, push a
            confirm RF entry to `Hit.righteousFury`.
      - [ ] RF confirmation rolls a second critical-injury lookup at the
            same hit location.
      - [ ] Unit tests for: standard threshold 10, Vengeful 8/9, Gauss 9,
            and the no-RF case.
      - [ ] Story renders the chat card with the RF callout.

  - id: p0-condition-automation
    title: "DH2 audit · P0 · Condition automation (Stunned/Pinned/Prone/Unconscious/Blinded/Deafened/Useless Limb/Blood Loss/Suffocation/Fatigue)"
    labels: [dh2-audit, "audit:p0", "area:combat", enhancement]
    body: |
      ## Audit point

      Condition schema at `src/module/data/item/condition.ts` exists but
      only Burning and Bleeding are auto-applied/ticked in
      `src/module/rules/active-effects.ts:51-76`. The remaining
      core-book conditions (`core.md` §"Conditions And Special Damage")
      are absent.

      ## Acceptance criteria

      - [ ] Per-condition handlers in `active-effects.ts` for: Stunned,
            Pinned, Prone, Unconscious, Blinded, Deafened, Useless Limb,
            Blood Loss (Heavily Damaged tick), Suffocation,
            Fatigue (accumulating).
      - [ ] Knock-Down / Stun / Suppressing Fire actions in
            `combat-actions.ts` apply the relevant AE on resolution.
      - [ ] Per-condition unit tests covering apply / tick / removal.
      - [ ] Storybook renders a token-HUD with each condition applied.
      - [ ] i18n under `WH40K.Conditions.*`.

  - id: p0-fatigue-characteristic-damage
    title: "DH2 audit · P0 · Fatigue + characteristic damage tracking"
    labels: [dh2-audit, "audit:p0", "area:combat", "area:character", enhancement]
    body: |
      ## Audit point

      `fatigue.value` exists at `creature.ts:159-162` but no code path
      writes to it. No characteristic-damage tracking
      (`system.characteristics[*].damage`) exists, so recoverable
      injuries from `core.md` §"Characteristic Damage" cannot be modelled.

      ## Acceptance criteria

      - [ ] `applyFatigue(n)` on the actor document; consumes the
            `fatigue.value` slot.
      - [ ] `system.characteristics[*].damage` integer field; reduces
            both bonus and effective value until rest restores it.
      - [ ] Knock-Down / Forced March / Suppressing Fire wire to
            `applyFatigue()`.
      - [ ] Unit tests.

  - id: p0-weapon-qualities-umbrella
    title: "DH2 audit · P0 · Weapon-quality mechanical effects (umbrella, 28 qualities)"
    labels: [dh2-audit, "audit:p0", "area:combat", enhancement]
    body: |
      ## Audit point

      `weapon-quality-effects.ts` covers ~14 qualities (Phase 1 + 4). The
      following 28 are **label-only** in the data model with no
      mechanical effect:

      Blast (X), Concussive (X), Corrosive, Crippling (X), Flame,
      Flexible, Graviton, Hallucinogenic (X), Haywire (X), Inaccurate,
      Indirect (X), Lance, Maximal, Overheats, Power Field,
      Primitive (X), Proven (X), Razor Sharp, Recharge, Reliable,
      Sanctified, Scatter, Shocking, Smoke (X), Snare (X), Spray, Storm,
      Toxic (X), Twin-linked, Unreliable.

      ## Acceptance criteria

      - [ ] Mechanical effect implemented per quality, checked off below.
      - [ ] Each non-trivial quality (Blast template, Hallucinogenic
            table, Haywire jam, Spray template, Toxic toxin save) gets
            its own child issue.
      - [ ] Unit tests per quality.
      - [ ] Stories for any chat-card output specific to a quality.

      ### Per-quality checklist

      - [ ] Blast (X)
      - [ ] Concussive (X)
      - [ ] Corrosive
      - [ ] Crippling (X)
      - [ ] Flame (auto-Burning on hit)
      - [ ] Flexible (cannot be parried)
      - [ ] Graviton (knockdown + Pinning)
      - [ ] Hallucinogenic (X)
      - [ ] Haywire (X)
      - [ ] Inaccurate (cannot benefit from Aim)
      - [ ] Indirect (X)
      - [ ] Lance (Pen × DoS to 1)
      - [ ] Maximal (Overheats + ×2 damage + Recharge interaction)
      - [ ] Overheats (1–9 → self damage)
      - [ ] Power Field (parry destroys non-Power weapons)
      - [ ] Primitive (X) (vs non-Primitive armour halved)
      - [ ] Proven (X) (damage die floor)
      - [ ] Razor Sharp (Pen × 2 on 2+ DoS)
      - [ ] Recharge (every other turn)
      - [ ] Reliable (jam only on 100; linked to p0-weapon-jams-unjam)
      - [ ] Sanctified (Daemons cannot ignore damage)
      - [ ] Scatter (range-banded damage & Pen modifier)
      - [ ] Shocking (Toughness vs Stun)
      - [ ] Smoke (X)
      - [ ] Snare (X)
      - [ ] Spray (template, no BS test required)
      - [ ] Storm (RoF doubled)
      - [ ] Toxic (X)
      - [ ] Twin-linked (+20 BS on single shot, +1 hit on burst)
      - [ ] Unreliable (jam on 91+; linked to p0-weapon-jams-unjam)

