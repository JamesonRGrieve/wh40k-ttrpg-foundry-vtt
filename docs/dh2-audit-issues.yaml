    body: |
      ## Audit point

      `core.md` §"Trying Again" — some skills cannot retry until a
      condition changes; others incur a penalty. Surface as a soft
      warning, not a hard block.

      ## Acceptance criteria

      - [ ] Per (actor, skill) `triedAt` flag on chat cards.
      - [ ] Roll dialog warns when retry-blocked skill is selected
            within the same scene / day.
      - [ ] Tests.

