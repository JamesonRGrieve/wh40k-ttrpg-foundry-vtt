  - id: beyond-malefic-corruption-on-use
    title: "DH2 audit · P1 · Beyond · Malefic Daemonology corruption-on-use automation"
    labels: [dh2-audit, "audit:p1", "source:beyond", "area:psychic", "area:character", enhancement]
    body: |
      ## Audit point

      `beyond.md` §"Malefic Daemonology" — every successful manifestation
      of a Malefic power grants Corruption equal to the psy rating used.
      Not automated; players manually adjust.

      ## Acceptance criteria

      - [ ] On a successful Malefic focus power test, the actor's
            Corruption increases by the PR used (clamped sanely).
      - [ ] Push interaction: pushed PR counts.
      - [ ] Settings toggle to disable for groups using manual tracking.
      - [ ] Tests + story coverage.

  - id: beyond-daemonic-mastery-test
    title: "DH2 audit · P1 · Beyond · Daemonic Mastery test framework"
    labels: [dh2-audit, "audit:p1", "source:beyond", "area:psychic", enhancement]
    body: |
      ## Audit point

      `beyond.md` p. 59 — Daemonic Mastery is an opposed Willpower test
      at Very Hard (−30) baseline, modified by True Name (+30), proper
      ritual components, etc. Used by Summoning, Binding, and Exorcism.

      ## Acceptance criteria

      - [ ] `acolyte.rollDaemonicMasteryTest(target, modifiers)`.
      - [ ] Opposed-test pathway already exists in roll-data; this just
            seeds it with the Daemonic Mastery defaults.
      - [ ] Modifier sources documented and stackable.

