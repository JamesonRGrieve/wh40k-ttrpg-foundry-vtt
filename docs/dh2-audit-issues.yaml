      Lore test, ritual components, True Name bonus +30, Daemonic Mastery
      opposed against the daemon's Willpower, binding duration = 1 hour
      per DoS.

      ## Acceptance criteria

      - [ ] Ritual outcome captured as a chat-card workflow with the
            Forbidden Lore test, optional Daemonic Mastery follow-up,
            and a generated binding-duration timer.
      - [ ] Failure consequences (loose daemon) flagged for GM.

