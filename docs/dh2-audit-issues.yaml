  - id: p1-malignancy-test
    title: "DH2 audit · P1 · Malignancy / Mutation test rolls"
    labels: [dh2-audit, "audit:p1", "area:character", enhancement]
    body: |
      ## Audit point

      `core.md` §"The Malignancy Test" — percentile against
      (Corruption ÷ 10), triggered at thresholds. Item types
      (`malignancy.ts`, `mutation.ts`) exist; the test does not.

      ## Acceptance criteria

      - [ ] `acolyte.rollMalignancyTest()` percentile-vs-CP/10.
      - [ ] On failure: roll malignancy table, create the embedded item.
      - [ ] Hook the test to corruption-threshold crossings (10, 20, 30,
            …).
      - [ ] Tests + story.

  - id: p1-influence-acquisition
    title: "DH2 audit · P1 · Influence + Requisition Test wiring"
    labels: [dh2-audit, "audit:p1", "area:narrative", enhancement]
    body: |
      ## Audit point

      `core.md` §"The Requisition Test" — target = Influence + modifiers
      from Availability (Ubiquitous +30 → Unique −30), Scarcity,
      Craftsmanship. `acquisition-dialog.ts` exists but the math is not
      wired; failed acquisitions with 3+ DoF drop Influence by 1.

      ## Acceptance criteria

      - [ ] `acquisition-dialog.ts` computes target from item
            availability + craftsmanship + scarcity.
      - [ ] On big-failure, Influence drops; flow updates
            `character.ts:171`.
      - [ ] Tests + story.

