name: CI

# Code-quality gate for every push and pull request (including forks). This is
# intentionally self-contained — it does NOT need the licensed Foundry runtime
# or the compendium content:
#   * The `src/packs` submodule (copyright content, private) is NOT checked out.
#     No unit test or ratchet reads it; vitest excludes tests/integration +
#     tests/e2e, and the build/release that bundles packs is handled elsewhere.
#   * Tier A integration + Tier B e2e require `.foundry-release/` (licensed,
#     gitignored) and self-skip; they are not run here.
#
# Building the distributable + publishing it for the Foundry manifest is
# deliberately NOT done here, because it would require the copyright packs. That
# lives in the private CI (Forgejo) where the content can be present.
#
# Portability: only actions/checkout, pnpm/action-setup, actions/setup-node are
# used (all available on Forgejo Actions), and the work is plain `pnpm` scripts,
# so this migrates to Forgejo with at most a runner-label change.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint · typecheck · tests (no e2e)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false # packs are private/copyright and not needed here
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # lint + format-check + stylelint + typecheck + typecheck:tests + vitest.
      - run: pnpm check
      # Storybook functional render/interaction tests. --ignore-snapshots skips
      # the env-bound pixel baselines (enforced by the local pre-commit hook).
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm exec storybook build
      - run: pnpm exec playwright test -c playwright.storybook.config.ts --ignore-snapshots

  ratchets:
    name: Coverage ratchets (no regressions)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Enforce the one-way valve on every PR: no ratchet may regress vs the
      # committed baselines. (The pre-commit hook is the only other place these
      # run, and it is bypassable / does not fire on contributors' branches.)
      # i18n codegen freshness, lockfile host allow-list, and the plugin-audit
      # hard gate are included; e2e:ratchet / integration:ratchet are omitted
      # (they need the licensed Foundry).
      - run: pnpm ci:ratchets
